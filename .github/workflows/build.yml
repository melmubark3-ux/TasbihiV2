name: Android Build & Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm install --legacy-peer-deps
      - run: npm run lint --if-present || true
      - run: npx tsc --noEmit || true
      - run: npm test -- --passWithNoTests || true

  build-android:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - run: npm install --legacy-peer-deps
      
      - name: Generate Autolinking Config (Manual)
        run: |
          mkdir -p android/build/generated/autolinking
          cat > android/build/generated/autolinking/autolinking.json << 'AUTOLINKEOF'
{
  "project": {
    "android": {
      "packageName": "com.tasbihi",
      "sourceDir": "android/app/src/main/java"
    }
  },
  "dependencies": {
    "@notifee/react-native": {
      "root": "node_modules/@notifee/react-native",
      "platforms": { "android": { "sourceDir": "node_modules/@notifee/react-native/android" } }
    },
    "@react-native-async-storage/async-storage": {
      "root": "node_modules/@react-native-async-storage/async-storage",
      "platforms": { "android": { "sourceDir": "node_modules/@react-native-async-storage/async-storage/android" } }
    },
    "@react-native-community/geolocation": {
      "root": "node_modules/@react-native-community/geolocation",
      "platforms": { "android": { "sourceDir": "node_modules/@react-native-community/geolocation/android" } }
    },
    "@react-native-community/slider": {
      "root": "node_modules/@react-native-community/slider",
      "platforms": { "android": { "sourceDir": "node_modules/@react-native-community/slider/android" } }
    },
    "@react-native-picker/picker": {
      "root": "node_modules/@react-native-picker/picker",
      "platforms": { "android": { "sourceDir": "node_modules/@react-native-picker/picker/android" } }
    },
    "@react-native-voice/voice": {
      "root": "node_modules/@react-native-voice/voice",
      "platforms": { "android": { "sourceDir": "node_modules/@react-native-voice/voice/android" } }
    },
    "react-native-safe-area-context": {
      "root": "node_modules/react-native-safe-area-context",
      "platforms": { "android": { "sourceDir": "node_modules/react-native-safe-area-context/android" } }
    },
    "react-native-screens": {
      "root": "node_modules/react-native-screens",
      "platforms": { "android": { "sourceDir": "node_modules/react-native-screens/android" } }
    },
    "react-native-sound": {
      "root": "node_modules/react-native-sound",
      "platforms": { "android": { "sourceDir": "node_modules/react-native-sound/android" } }
    },
    "react-native-vector-icons": {
      "root": "node_modules/react-native-vector-icons",
      "platforms": { "android": { "sourceDir": "node_modules/react-native-vector-icons/android" } }
    }
  }
}
AUTOLINKEOF
          echo "Autolinking config generated manually"
          
      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
          
      - uses: actions/upload-artifact@v4
        with:
          name: tasbihi-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
